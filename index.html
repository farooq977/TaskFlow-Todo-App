<!DOCTYPE html>
<html lang="en">
<head>
	<title>Todo List</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="css/style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
</head>
<body>
	<div class="main-container" id="main-container">
		<span class="mode">
			<a href="#" class="moon" onclick="ChangeMode()">
				<i class="fa fa-moon-o" id="mode"></i>
			</a>
		</span>
		<span class="back_link">
			<a href="#">
				<i class="fa fa-long-arrow-left" id="back-to"> Back to project</i>
			</a>
		</span>
		<div class="container">
			<div class="section">
				<h3>TODO LIST</h3>
				<div class="head-manu">
					<table class="table-head" id="table-head">
						<tr>
							<th>Title</th>
							<th>Type</th>
							<th>Date</th>
							<th>Priority</th>
							<th>Action</th>
						</tr>
					</table>
				</div>
			</div>
		</div>
		<div class="add-todo">
			<div class="back-todo">
				<h3 id="todo-title">Add a Todo</h3>
				<p id="Error"></p>
				<form method="POST" class="add-form">
					<label for="title">Title</label>
					<input type="text" name="Title" placeholder="Title" id="title" autocomplete="off" required>
					<label for="project">Type</label>
					<select id="project">
						<option disabled selected value>Select Type</option>
						<option value="Home Work">Home Work</option>
						<option value="My Work">School Work</option>
					</select>
					<label for="date">Date</label>
					<input type="text" name="date-time" id="date" placeholder="Select Date" autocomplete="off" readonly>
					<label for="rating">Priority</label>
					<input type="range" min="1" max="5" value="1" class="rating" id="rating">
				</form>
				<div class="form-btn">
					<button class="submit" onclick="Submit()">Submit</button>
					<button class="clear" onclick="Clear()">Clear Form</button>
				</div>		
			</div>
		</div>			
	</div>
<script src="js/main.js"></script>
</body>
</html>
